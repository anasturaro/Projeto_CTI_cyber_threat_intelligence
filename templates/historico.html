{% extends "base.html" %}

{% block content %}

<h1>📜 Histórico</h1>

<table class="table table-dark table-striped">
    <thead>
        <tr>
            <th>IP</th>
            <th>AbuseIPDB</th>
            <th>VírusTotal</th>
            <th>Risco</th>
            <th>Data</th>
            <th>Detalhes</th>
        </tr>
    </thead>

    <tbody>
        {% for row in data %}
        <tr>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[6] }}</td>
            <td>{{ row[7] }}</td>
            <td>
                <a href="{{ url_for('detalhes', id=row[0]) }}" class="btn btn-sm btn-outline-light">
                    <i class="bi-file-earmark-text"></i>
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
